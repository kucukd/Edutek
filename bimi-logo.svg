<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG Tiny PS//EN"
  "http://www.w3.org/Graphics/SVG/1.2/DTD/svg12-ps.dtd">
<svg
  version="1.2"
  baseProfile="tiny-ps"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 500"
  width="500"
  height="500"
  xml:space="preserve"
  title="EDUTEK">

  <!-- =============================================
       EDUTEK BIMI Logo — SVG Tiny PS Profile
       Dimensions : 500x500 (1:1 square — BIMI required)
       Profile    : SVG Tiny PS (no scripts, no external refs)
       Colors     : Orange #F7941D | Navy #1a3ed4
       ============================================= -->

  <!-- Background circle (white) -->
  <circle cx="250" cy="250" r="250" fill="#ffffff"/>

  <!-- ---- Graduation Cap ---- -->
  <!-- Diamond brim -->
  <polygon
    points="250,105 370,160 250,215 130,160"
    fill="none"
    stroke="#1a3ed4"
    stroke-width="12"
    stroke-linejoin="round"/>

  <!-- Top board (oval) -->
  <ellipse cx="250" cy="105" rx="52" ry="18"
    fill="none" stroke="#F7941D" stroke-width="10"/>

  <!-- Tassel cord (left) -->
  <line x1="130" y1="160" x2="130" y2="248"
    stroke="#1a3ed4" stroke-width="9" stroke-linecap="round"/>

  <!-- Tassel knot -->
  <rect x="113" y="248" width="34" height="14" rx="5"
    fill="#F7941D"/>

  <!-- Tassel fringe lines -->
  <line x1="120" y1="262" x2="116" y2="285"
    stroke="#F7941D" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="262" x2="130" y2="288"
    stroke="#F7941D" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="262" x2="144" y2="285"
    stroke="#F7941D" stroke-width="4" stroke-linecap="round"/>

  <!-- ---- Magnifying Glass (inside cap) ---- -->
  <circle cx="250" cy="160" r="34"
    fill="none" stroke="#F7941D" stroke-width="10"/>
  <!-- Handle -->
  <line x1="276" y1="186" x2="300" y2="212"
    stroke="#F7941D" stroke-width="11" stroke-linecap="round"/>

  <!-- ---- Logo Text ---- -->
  <!-- "edu" — orange -->
  <text
    x="100"
    y="355"
    font-family="Arial, Helvetica, sans-serif"
    font-size="92"
    font-weight="800"
    fill="#F7941D"
    letter-spacing="-2">edu</text>

  <!-- "tek" — navy -->
  <text
    x="282"
    y="355"
    font-family="Arial, Helvetica, sans-serif"
    font-size="92"
    font-weight="800"
    fill="#1a3ed4"
    letter-spacing="-2">tek</text>

  <!-- Thin orange underline accent -->
  <rect x="100" y="368" width="300" height="6" rx="3" fill="#F7941D"/>

</svg>