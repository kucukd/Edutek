<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 500"
  width="500" height="500"
  xml:space="preserve">
  <title>EDUTEK</title>

  <!--
    EDUTEK BIMI Logo v3
    ✅ No DOCTYPE (prevents DTD fetch timeout)
    ✅ All shapes use fill (max renderer compatibility)
    ✅ No font-family, no gradients, no filters, no scripts
    ✅ SVG Tiny PS 1.2 compliant
    ✅ 500×500 square viewBox
  -->

  <!-- ── White background circle ── -->
  <circle cx="250" cy="250" r="250" fill="#ffffff"/>

  <!-- ── Border: outer orange ring ── -->
  <circle cx="250" cy="250" r="247" fill="none" stroke="#F7941D" stroke-width="6"/>
  <!-- ── Border: inner navy ring ── -->
  <circle cx="250" cy="250" r="239" fill="none" stroke="#1a3ed4" stroke-width="2"/>

  <!-- ════════════════════════════════
       GRADUATION CAP (fill-based)
       ════════════════════════════════ -->

  <!-- Diamond brim — thick filled polygon border via two polygons -->
  <!-- Outer brim shape (navy) -->
  <polygon points="250,96 381,154 250,212 119,154"
    fill="#1a3ed4"/>
  <!-- Inner brim cutout (white) — slightly smaller -->
  <polygon points="250,108 367,157 250,206 133,157"
    fill="#ffffff"/>

  <!-- Top board — orange filled ring (outer ellipse minus inner) -->
  <!-- Outer ellipse -->
  <ellipse cx="250" cy="96" rx="56" ry="20" fill="#F7941D"/>
  <!-- Inner ellipse cutout -->
  <ellipse cx="250" cy="96" rx="44" ry="11" fill="#ffffff"/>

  <!-- Tassel cord (navy filled rect, rotated) -->
  <rect x="118" y="154" width="10" height="92" rx="5" fill="#1a3ed4"/>

  <!-- Tassel knot -->
  <rect x="104" y="246" width="36" height="14" rx="5" fill="#F7941D"/>

  <!-- Tassel fringe — 3 thin filled rects -->
  <rect x="111" y="260" width="5" height="24" rx="2" fill="#F7941D"
    transform="rotate(-5,111,260)"/>
  <rect x="121" y="260" width="5" height="27" rx="2" fill="#F7941D"/>
  <rect x="131" y="260" width="5" height="24" rx="2" fill="#F7941D"
    transform="rotate(5,131,260)"/>

  <!-- Magnifying glass: orange filled ring -->
  <circle cx="250" cy="157" r="37" fill="#F7941D"/>
  <circle cx="250" cy="157" r="26" fill="#ffffff"/>

  <!-- Magnifying glass handle (orange filled rotated rect) -->
  <rect x="268" y="172" width="12" height="38" rx="6" fill="#F7941D"
    transform="rotate(45,274,191)"/>

  <!-- ════════════════════════════════
       LOGO TEXT — FILL ONLY
       All letters built from filled rects, circles, paths
       sw = virtual stroke width = 11px
       ════════════════════════════════ -->

  <!-- ┌─────────────────────────────────────────────┐
       │  'e'  orange  cx≈114  (open circle + bar)   │
       └─────────────────────────────────────────────┘ -->
  <!-- Outer filled circle -->
  <circle cx="114" cy="340" r="28" fill="#F7941D"/>
  <!-- Inner white cutout -->
  <circle cx="114" cy="340" r="17" fill="#ffffff"/>
  <!-- Right-side gap (white rectangle cuts opening) -->
  <rect x="126" y="328" width="30" height="24" fill="#ffffff"/>
  <!-- Restore middle crossbar (orange rect) -->
  <rect x="86" y="334" width="56" height="11" rx="2" fill="#F7941D"/>

  <!-- ┌─────────────────────────────────────────────┐
       │  'd'  orange  bowl cx=178, stem x=201       │
       └─────────────────────────────────────────────┘ -->
  <!-- Circle ring (bowl) -->
  <circle cx="178" cy="348" r="28" fill="#F7941D"/>
  <circle cx="178" cy="348" r="17" fill="#ffffff"/>
  <!-- Stem (tall vertical filled rect) -->
  <rect x="195" y="296" width="11" height="80" rx="5" fill="#F7941D"/>
  <!-- White cutout to separate stem from bowl visually at bottom -->

  <!-- ┌─────────────────────────────────────────────┐
       │  'u'  orange  left=220 right=258            │
       └─────────────────────────────────────────────┘ -->
  <!-- Left stem -->
  <rect x="214" y="296" width="11" height="62" rx="5" fill="#F7941D"/>
  <!-- Right stem -->
  <rect x="252" y="296" width="11" height="62" rx="5" fill="#F7941D"/>
  <!-- Bottom curve: semicircle -->
  <path d="M 214,352 Q 214,375 239,375 Q 264,375 263,352 L 252,352
           Q 252,365 239,365 Q 226,365 225,352 Z"
    fill="#F7941D"/>

  <!-- ┌─────────────────────────────────────────────┐
       │  't'  navy   stem=284  bar y=315            │
       └─────────────────────────────────────────────┘ -->
  <!-- Stem -->
  <rect x="278" y="274" width="11" height="102" rx="5" fill="#1a3ed4"/>
  <!-- Crossbar -->
  <rect x="260" y="309" width="47" height="11" rx="5" fill="#1a3ed4"/>

  <!-- ┌─────────────────────────────────────────────┐
       │  'e'  navy   cx≈330                         │
       └─────────────────────────────────────────────┘ -->
  <circle cx="330" cy="340" r="28" fill="#1a3ed4"/>
  <circle cx="330" cy="340" r="17" fill="#ffffff"/>
  <rect x="342" y="328" width="30" height="24" fill="#ffffff"/>
  <rect x="302" y="334" width="56" height="11" rx="2" fill="#1a3ed4"/>

  <!-- ┌─────────────────────────────────────────────┐
       │  'k'  navy   stem=380  fork y=340           │
       └─────────────────────────────────────────────┘ -->
  <!-- Stem -->
  <rect x="374" y="296" width="11" height="80" rx="5" fill="#1a3ed4"/>
  <!-- Upper arm (diagonal rect rotated) -->
  <rect x="374" y="296" width="11" height="52" rx="4" fill="#1a3ed4"
    transform="rotate(-37,379,340)"/>
  <!-- Lower arm (diagonal rect rotated) -->
  <rect x="374" y="340" width="11" height="52" rx="4" fill="#1a3ed4"
    transform="rotate(37,379,340)"/>

  <!-- ── Orange underline accent ── -->
  <rect x="86" y="385" width="310" height="7" rx="3" fill="#F7941D"/>

</svg>